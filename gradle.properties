# Корень submodule: каталог `namespace-forest/` относительно корня репозитория md-sparrow
# (после `git submodule update --init` — см. README и .gitmodules).
xsd.root=namespace-forest

# Подкаталоги со схемами внутри namespace-forest (синхронизировать с SchemaVersion.java).
xjc.xsdRelative.2_20=schemas/2.20
xjc.xsdRelative.2_21=schemas/2.21

# Подкаталог xjb/ns/<версия>/ с catalog.xml и bindings.xjb (имя как у schemas/<версия>).
xjc.bindingsDir.2_20=2.20
xjc.bindingsDir.2_21=2.21

org.gradle.parallel=true
org.gradle.caching=true
